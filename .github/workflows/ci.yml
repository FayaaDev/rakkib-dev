name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install rakkib (editable) with test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Compile sources
        run: python -m compileall -q src/rakkib

      - name: Pytest
        run: pytest -q
