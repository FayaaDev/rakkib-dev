    subdomain_placeholder: WEBDAV_SUBDOMAIN
    env_keys:
      - WEBDAV_USERNAME
      - WEBDAV_PASSWORD
      - WEBDAV_AUTH_TYPE
      - WEBDAV_LOCATION
      - WEBDAV_ANONYMOUS_METHODS
    depends_on: []
    host_service: false
    host_port: false
    internal_access:
      enabled: true
      host_port: 13010
      container_port: 80
    caddy:
      template: webdav-public.caddy.tmpl
    data_dirs:
      - data/webdav/dav
    extra_templates:
      - src: templates/docker/webdav/index.html.tmpl
        dst: data/webdav/dav/index.html
    secrets:
      WEBDAV_USERNAME:
        value: admin
      WEBDAV_PASSWORD:
        factory: password
      WEBDAV_AUTH_TYPE:
        value: Basic
      WEBDAV_LOCATION:
        value: /
      # Allow unauthenticated GET so `rakkib smoke webdav` (curl -fsSL) can succeed.
      # Write methods remain authenticated by default.
      WEBDAV_ANONYMOUS_METHODS:
        value: GET,OPTIONS
    homepage:
      category: File Sharing
      name: WebDAV
      description: Simple WebDAV server (Apache)
