    default_port: 2283
    default_subdomain: immich
    subdomain_key: immich
    subdomain_placeholder: IMMICH_SUBDOMAIN
    env_keys:
      - IMMICH_DB_PASSWORD
      - IMMICH_VERSION
    depends_on: []
    host_service: false
    host_port: false
    caddy:
      template: immich-public.caddy.tmpl
    env_preserve_keys:
      - IMMICH_DB_PASSWORD
      - IMMICH_VERSION
    data_dirs:
      - data/immich/library
      - data/immich/postgres
    secrets:
      IMMICH_DB_PASSWORD:
        factory: password
        length: 32
      IMMICH_VERSION:
        value: release
    homepage:
      category: Media
      name: Immich
      description: Photo and video library
      icon: immich.png
    monitoring:
      enabled: true
      type: http
      target: public_url
      path: /
      interval: 60
      timeout: 10
      retries: 3
    notes: "Photo and video library. Optional. CPU-only v1 install using Immich's dedicated Postgres and Valkey services."
