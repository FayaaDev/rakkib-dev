  - id: webdav
    state_bucket: selected_services
    required: false
    optional: true
    image: bytemark/webdav:latest
    default_port: 80
    default_subdomain: webdav
    subdomain_key: webdav
    subdomain_placeholder: WEBDAV_SUBDOMAIN
    env_keys:
      - WEBDAV_USERNAME
      - WEBDAV_PASSWORD
      - WEBDAV_AUTH_TYPE
      - WEBDAV_LOCATION
      - WEBDAV_ANONYMOUS_METHODS
    depends_on: []
    host_service: false
    host_port: false
    caddy:
      template: webdav-public.caddy.tmpl
    data_dirs:
      - data/webdav/dav
    extra_templates:
      - src: templates/docker/webdav/index.html.tmpl
        dst: data/webdav/dav/index.html
    secrets:
      WEBDAV_USERNAME:
        value: admin
      WEBDAV_PASSWORD:
        factory: password
      WEBDAV_AUTH_TYPE:
        value: Basic
      WEBDAV_LOCATION:
        value: /
      # Allow unauthenticated GET so `rakkib smoke webdav` (curl -fsSL) can succeed.
      # Write methods remain authenticated by default.
      WEBDAV_ANONYMOUS_METHODS:
        value: GET,OPTIONS
    homepage:
      category: File Sharing
      name: WebDAV
      description: Simple WebDAV server (Apache)
      icon: folder.png
    monitoring:
      enabled: true
      type: http
      target: public_url
      path: /
      interval: 60
      timeout: 10
      retries: 3
    smoke:
      path: /
      expected_text: "WebDAV endpoint"
    notes: "Apache WebDAV server (bytemark/webdav). Optional. Data stored under data/webdav/dav."
