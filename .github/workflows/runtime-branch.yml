name: Runtime Branch

on:
  push:
    branches:
      - main
      - runtime
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-runtime:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync runtime branch from main
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          chmod +x scripts/runtime-branch.sh
          scripts/runtime-branch.sh sync --main-ref origin/main --push

  verify-runtime:
    if: github.ref == 'refs/heads/runtime'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify runtime allowlist
        run: |
          git fetch origin main runtime
          chmod +x scripts/runtime-branch.sh
          scripts/runtime-branch.sh verify-ref --main-ref origin/main --runtime-ref HEAD
