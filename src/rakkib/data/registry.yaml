services:
  - id: caddy
    state_bucket: always
    required: true
    image: caddy:2
    default_port: 80
    default_subdomain: null
    subdomain_key: null
    subdomain_placeholder: null
    env_keys: []
    depends_on: []
    host_service: false
    host_port: true
    notes: "Reverse proxy. Always installed."

  - id: cloudflared
    state_bucket: always
    required: true
    image: cloudflare/cloudflared:latest
    default_port: null
    default_subdomain: null
    subdomain_key: null
    subdomain_placeholder: null
    env_keys: []
    env_preserve_keys:
      - TUNNEL_UUID
      - CLOUDFLARED_METRICS_PORT
      - ADMIN_UID
      - ADMIN_GID
    depends_on: []
    host_service: false
    notes: "Cloudflare tunnel. Always installed. Step 3 may pause for guided Cloudflare login approval."

  - id: postgres
    state_bucket: always
    required: true
    image: pgvector/pgvector:pg16
    default_port: 5432
    default_subdomain: null
    subdomain_key: null
    subdomain_placeholder: null
    env_keys:
      - POSTGRES_PASSWORD
    depends_on: []
    host_service: false
    host_port: true
    secrets:
      POSTGRES_PASSWORD:
        factory: password
    notes: "Single postgres instance serves all services. Port bound to 127.0.0.1 only."

  # --- Foundation Bundle (recommended, presented as a pre-checked group) ---

  - id: nocodb
    state_bucket: foundation_services
    required: false
    optional: true
    foundation: true
    image: nocodb/nocodb:latest
    default_port: 8080
    default_subdomain: nocodb
    subdomain_key: nocodb
    subdomain_placeholder: NOCODB_SUBDOMAIN
    env_keys:
      - NOCODB_DB_PASS
      - ADMIN_EMAIL
      - NOCODB_ADMIN_PASS
    depends_on: [postgres]
    host_service: false
    host_port: false
    caddy:
      template: nocodb.caddy.tmpl
    secrets:
      NOCODB_ADMIN_PASS:
        factory: password
      NOCODB_DB_PASS:
        factory: password
    postgres:
      role: nocodb
      db: nocodb_db
      password_key: NOCODB_DB_PASS
      display_name: NocoDB
    homepage:
      category: Infrastructure
      name: NocoDB
      description: No-code database UI
      icon: nocodb.png
    monitoring:
      enabled: true
      type: http
      target: public_url
      path: /
      interval: 60
      timeout: 10
      retries: 3
    notes: "No-code database UI. Foundation bundle service."
    hooks:
      pre_start:
        - service_postgres_login_preflight

  - id: homepage
    state_bucket: foundation_services
    required: false
    optional: true
    foundation: true
    image: ghcr.io/gethomepage/homepage:latest
    default_port: 3000
    default_subdomain: home
    subdomain_key: homepage
    subdomain_placeholder: HOMEPAGE_SUBDOMAIN
    env_keys: []
    depends_on: []
    host_service: false
    host_port: false
    caddy:
      template: homepage-public.caddy.tmpl
    data_dirs:
      - data/homepage/config
    hooks:
      post_render:
        - homepage_services_yaml
    notes: "Service dashboard. Foundation bundle service. services.yaml generated from selected service list."

  - id: uptime-kuma
    state_bucket: foundation_services
    required: false
    optional: true
    foundation: true
    image: louislam/uptime-kuma:latest
    default_port: 3001
    default_subdomain: status
    subdomain_key: uptime-kuma
    subdomain_placeholder: UPTIME_KUMA_SUBDOMAIN
    env_keys:
      - UPTIME_KUMA_ADMIN_USER
      - UPTIME_KUMA_ADMIN_PASS
    depends_on: []
    host_service: false
    host_port: false
    caddy:
      template: uptime-kuma-public.caddy.tmpl
    secrets:
      UPTIME_KUMA_ADMIN_USER:
        value: admin
      UPTIME_KUMA_ADMIN_PASS:
        factory: password
    homepage:
      category: Infrastructure
      name: Uptime Kuma
      description: Uptime monitoring
      icon: uptime-kuma.png
    monitoring:
      enabled: true
      type: http
      target: public_url
      path: /
      interval: 60
      timeout: 10
      retries: 3
    notes: "Uptime monitoring. Foundation bundle service."

  - id: dockge
    state_bucket: foundation_services
    required: false
    optional: true
    foundation: true
    image: louislam/dockge:latest
    default_port: 5001
    default_subdomain: dockge
    subdomain_key: dockge
    subdomain_placeholder: DOCKGE_SUBDOMAIN
    env_keys: []
    depends_on: []
    host_service: false
    host_port: false
    caddy:
      template: dockge-public.caddy.tmpl
    homepage:
      category: Infrastructure
      name: Dockge
      description: Compose manager
      icon: docker.png
    monitoring:
      enabled: true
      type: http
      target: public_url
      path: /
      interval: 60
      timeout: 10
      retries: 3
    notes: "Docker Compose manager UI. Foundation bundle service. Mounts the stacks directory."

  # --- Optional Services (Tier 1) ---

  - id: n8n
    state_bucket: selected_services
    required: false
    optional: true
    image: n8nio/n8n:latest
    default_port: 5678
    default_subdomain: n8n
    subdomain_key: n8n
    subdomain_placeholder: N8N_SUBDOMAIN
    env_keys:
      - N8N_DB_PASS
      - N8N_ENCRYPTION_KEY
    depends_on: [postgres]
    host_service: false
    host_port: false
    caddy:
      template: n8n-public.caddy.tmpl
    env_preserve_keys:
      - N8N_ENCRYPTION_KEY
    data_dirs:
      - data/n8n/n8n
      - data/n8n/n8nworkflows
    chown:
      uid: 1000
      gid: 1000
    secrets:
      N8N_DB_PASS:
        factory: password
    conditional_secrets:
      - when: secrets.n8n_mode != migrate
        keys:
          N8N_ENCRYPTION_KEY:
            factory: password
            length: 32
    postgres:
      role: n8n
      db: n8n_db
      password_key: N8N_DB_PASS
      display_name: n8n
    homepage:
      category: Automation
      name: n8n
      description: Workflow automation
      icon: n8n.png
    monitoring:
      enabled: true
      type: http
      target: public_url
      path: /
      interval: 60
      timeout: 10
      retries: 3
    notes: "Workflow automation. NEVER rotate N8N_ENCRYPTION_KEY after first run. Uses the upstream n8nio/n8n image."
    hooks:
      pre_start:
        - service_postgres_login_preflight

