      icon: docker.png
    monitoring:
      enabled: true
      type: http
      target: public_url
      path: /
      interval: 60
      timeout: 10
      retries: 3
    smoke:
      path: /
      expected_text: Dockge
    notes: "Docker Compose manager UI. Foundation bundle service. Mounts the stacks directory."
    hooks:
      remove:
        - cloudflare_dns_delete

  # --- Optional Services (Tier 1) ---

  - id: n8n
    state_bucket: selected_services
    required: false
    optional: true
    image: n8nio/n8n:latest
    default_port: 5678
    default_subdomain: n8n
    subdomain_key: n8n
    subdomain_placeholder: N8N_SUBDOMAIN
    env_keys:
      - N8N_DB_PASS
      - N8N_ENCRYPTION_KEY
    depends_on: [postgres]
    host_service: false
    host_port: false
    internal_access:
      enabled: true
      host_port: 13004
      container_port: 5678
    caddy:
      template: n8n-public.caddy.tmpl
    env_preserve_keys:
      - N8N_ENCRYPTION_KEY
    data_dirs:
      - data/n8n/n8n
      - data/n8n/n8nworkflows
    chown:
      uid: 1000
      gid: 1000
    secrets:
      N8N_DB_PASS:
        factory: password
    conditional_secrets:
      - when: secrets.n8n_mode != migrate
        keys:
          N8N_ENCRYPTION_KEY:
            factory: password
            length: 32
    postgres:
      role: n8n
      db: n8n_db
      password_key: N8N_DB_PASS
      display_name: n8n
    homepage:
      category: Automation
      name: n8n
      description: Workflow automation
      icon: n8n.png
    monitoring:
      enabled: true
      type: http
      target: public_url
      path: /
      interval: 60
      timeout: 10
      retries: 3
    smoke:
      path: /
      expected_text: n8n
    notes: "Workflow automation. NEVER rotate N8N_ENCRYPTION_KEY after first run. Uses the upstream n8nio/n8n image."
    hooks:
      pre_start:
        - service_postgres_login_preflight
      remove:
        - cloudflare_dns_delete

