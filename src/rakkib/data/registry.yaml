services:
  - id: caddy
    state_bucket: always
    required: true
    image: caddy:2
    default_port: 80
    default_subdomain: null
    subdomain_key: null
    subdomain_placeholder: null
    env_keys: []
    depends_on: []
    host_service: false
    host_port: true
    data_dirs:
      - data/caddy/data
      - data/caddy/config
    notes: "Reverse proxy. Installed only for Cloudflare exposure."

  - id: cloudflared
    state_bucket: always
    required: true
    image: cloudflare/cloudflared:latest
    default_port: null
    default_subdomain: null
    subdomain_key: null
    subdomain_placeholder: null
    env_keys: []
    env_preserve_keys:
      - TUNNEL_UUID
      - CLOUDFLARED_METRICS_PORT
      - ADMIN_UID
      - ADMIN_GID
    depends_on: []
    host_service: false
    data_dirs:
      - data/cloudflared
    notes: "Cloudflare tunnel. Installed only for Cloudflare exposure. Step 3 may pause for guided Cloudflare login approval."

  - id: postgres
    state_bucket: always
    required: true
    image: pgvector/pgvector:pg16
    default_port: 5432
    default_subdomain: null
    subdomain_key: null
    subdomain_placeholder: null
    env_keys:
      - POSTGRES_PASSWORD
    depends_on: []
    host_service: false
    host_port: true
    data_dirs:
      - data/postgres/data
    secrets:
      POSTGRES_PASSWORD:
        factory: password
    notes: "Single postgres instance serves all services. Port bound to 127.0.0.1 only."

  # --- Foundation Bundle (recommended, presented as a pre-checked group) ---

  - id: nocodb
    state_bucket: foundation_services
    required: false
    optional: true
    foundation: true
    image: nocodb/nocodb:latest
    default_port: 8080
    default_subdomain: nocodb
    subdomain_key: nocodb
    subdomain_placeholder: NOCODB_SUBDOMAIN
    env_keys:
      - NOCODB_DB_PASS
      - ADMIN_EMAIL
      - NOCODB_ADMIN_PASS
    depends_on: [postgres]
    host_service: false
    host_port: false
    internal_access:
      enabled: true
      host_port: 13001
      container_port: 8080
    caddy:
      template: nocodb.caddy.tmpl
    secrets:
      NOCODB_ADMIN_PASS:
        factory: password
      NOCODB_DB_PASS:
        factory: password
    postgres:
      role: nocodb
      db: nocodb_db
      password_key: NOCODB_DB_PASS
      display_name: NocoDB
    data_dirs:
      - data/nocodb
    homepage:
      category: Infrastructure
      name: NocoDB
      description: No-code database UI
      icon: nocodb.png
    monitoring:
      enabled: true
      type: http
      target: public_url
      path: /
      interval: 60
      timeout: 10
      retries: 3
    smoke:
      path: /
      expected_text: NocoDB
    notes: "No-code database UI. Foundation bundle service."
    hooks:
      pre_start:
        - service_postgres_login_preflight
      remove:
        - cloudflare_dns_delete

  - id: homepage
    state_bucket: foundation_services
    required: false
    optional: true
    foundation: true
    image: ghcr.io/gethomepage/homepage:latest
    default_port: 3000
    default_subdomain: home
    subdomain_key: homepage
    subdomain_placeholder: HOMEPAGE_SUBDOMAIN
    env_keys: []
    depends_on: []
    host_service: false
    host_port: false
    internal_access:
      enabled: true
      host_port: 13000
      container_port: 3000
    caddy:
      template: homepage-public.caddy.tmpl
    data_dirs:
      - data/homepage/config
    hooks:
      post_render:
        - homepage_services_yaml
      remove:
        - cloudflare_dns_delete
    smoke:
      path: /
      expected_text: Homepage
    notes: "Service dashboard. Foundation bundle service. services.yaml generated from selected service list."

  - id: uptime-kuma
    state_bucket: foundation_services
    required: false
    optional: true
    foundation: true
    image: louislam/uptime-kuma:latest
    default_port: 3001
    default_subdomain: status
    subdomain_key: uptime-kuma
    subdomain_placeholder: UPTIME_KUMA_SUBDOMAIN
    env_keys: []
    depends_on: []
    host_service: false
    host_port: false
    internal_access:
      enabled: true
      host_port: 13002
      container_port: 3001
    caddy:
      template: uptime-kuma-public.caddy.tmpl
    secrets:
      UPTIME_KUMA_ADMIN_USER:
        value: admin
      UPTIME_KUMA_ADMIN_PASS:
        factory: password
    data_dirs:
      - data/uptime-kuma
    homepage:
      category: Infrastructure
      name: Uptime Kuma
      description: Uptime monitoring
      icon: uptime-kuma.png
    monitoring:
      enabled: true
      type: http
      target: public_url
      path: /
      interval: 60
      timeout: 10
      retries: 3
    smoke:
      path: /
      expected_text: Uptime Kuma
    notes: "Uptime monitoring. Foundation bundle service."
    hooks:
      remove:
        - cloudflare_dns_delete

